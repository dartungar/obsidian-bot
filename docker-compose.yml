services:
  obsidian-bot:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${OBSIDIAN_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}
      - BUTLER_TIMEZONE=${BUTLER_TIMEZONE:-UTC}
      - OBSIDIAN_VAULT_PATH=/var/notes
      - OBSIDIAN_DAILY_NOTES_PATTERN=${OBSIDIAN_DAILY_NOTES_PATTERN:-04 archive/journal/daily journal/*.md}
      - OBSIDIAN_INBOX_NOTE_PATH=${OBSIDIAN_INBOX_NOTE_PATH:-_inbox/_inbox.md}
      - OBSIDIAN_MEDIA_FOLDER_PATH=${OBSIDIAN_MEDIA_FOLDER_PATH:-_inbox}
    volumes:
      - ${OBSIDIAN_HOST_PATH:-/home/dartungar/notes-test}:/var/notes
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q ObsidianBot.dll /proc/1/cmdline"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    network_mode: bridge
    labels:
      - homepage.group=Bots
      - homepage.name=Obsidian Bot
      - homepage.icon=sh-pandoc-light.png
      - homepage.href=https://coolify.dartungar.com/project/ycsgggs0kssowcwgskww4cg8/environment/kk4sgs8wsgk44gc80c8soggk/application/r7bsa9osr3p7pwucxhe9oi7w


